<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>設定 API Key — 護理報告生成器</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:20px;padding:36px 28px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
    .icon{font-size:48px;text-align:center;margin-bottom:16px}
    h1{font-size:20px;font-weight:700;text-align:center;color:#1a569e;margin-bottom:8px}
    .sub{font-size:14px;color:#64748b;text-align:center;margin-bottom:20px;line-height:1.6}
    .step-box{background:#f8fafc;border-radius:12px;padding:16px;margin-bottom:24px;border:1px solid #e2e8f0}
    .step-title{font-size:13px;font-weight:700;color:#475569;margin-bottom:10px;letter-spacing:0.5px}
    .step{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;font-size:13px;color:#334155;line-height:1.5}
    .step:last-child{margin-bottom:0}
    .num{background:#f97316;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
    .link-btn{display:inline-flex;align-items:center;gap:6px;background:#f97316;color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;margin:4px 0;transition:background 0.2s}
    .link-btn:hover{background:#ea580c}
    label{font-size:14px;font-weight:600;color:#334155;display:block;margin-bottom:8px}
    .input-wrap{position:relative}
    input[type=password],input[type=text]{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:13px 44px 13px 14px;font-size:14px;font-family:monospace;color:#1e293b;background:#f8fafc;transition:border-color 0.2s}
    input:focus{outline:none;border-color:#f97316;background:#fff}
    .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;padding:4px}
    .btn-save{width:100%;padding:15px;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;transition:all 0.2s;letter-spacing:0.5px}
    .btn-save:disabled{opacity:0.6;cursor:not-allowed}
    .btn-save:active{transform:scale(0.98)}
    .msg{margin-top:14px;padding:12px 16px;border-radius:10px;font-size:14px;text-align:center;display:none}
    .msg.ok{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
    .msg.err{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
    .free-badge{display:inline-flex;align-items:center;gap:4px;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:20px}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔑</div>
    <h1>設定 Groq API Key</h1>
    <p class="sub">只需設定一次，之後每次啟動自動生效</p>
    <div style="text-align:center"><span class="free-badge">✅ 完全免費 · 不需信用卡 · 台灣可用</span></div>

    <div class="step-box">
      <div class="step-title">📋 取得免費 Groq API Key（約 1 分鐘）</div>
      <div class="step"><span class="num">1</span><span>點擊下方按鈕，開啟 Groq Console</span></div>
      <div class="step"><span class="num">2</span><span>用 Google 帳號或 Email 免費註冊</span></div>
      <div class="step"><span class="num">3</span><span>登入後點左側「<strong>API Keys</strong>」→「<strong>Create API Key</strong>」</span></div>
      <div class="step"><span class="num">4</span><span>複製金鑰（gsk_ 開頭）貼到下方</span></div>
      <div style="margin-top:12px">
        <a class="link-btn" href="https://console.groq.com/keys" target="_blank">🚀 前往取得免費 Groq API Key</a>
      </div>
    </div>

    <label for="keyInput">貼上你的 Groq API Key</label>
    <div class="input-wrap">
      <input type="password" id="keyInput" placeholder="gsk_..." autocomplete="off" spellcheck="false"/>
      <button class="eye-btn" onclick="toggleVis()" title="顯示/隱藏">👁</button>
    </div>

    <button class="btn-save" id="saveBtn" onclick="saveKey()">儲存並開始使用</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    fetch('/api/status').then(r=>r.json()).then(d=>{ if(d.configured) location.href='/'; }).catch(()=>{});

    function toggleVis() {
      const inp = document.getElementById('keyInput');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    async function saveKey() {
      const key = document.getElementById('keyInput').value.trim();
      const btn = document.getElementById('saveBtn');
      if (!key) { showMsg('請先輸入 API Key', 'err'); return; }
      if (key.length < 10) { showMsg('金鑰太短，請確認是否完整複製', 'err'); return; }

      btn.disabled = true;
      btn.textContent = '儲存中…';
      try {
        const resp = await fetch('/api/savekey', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key })
        });
        let data;
        try { data = await resp.json(); } catch { showMsg('伺服器回應異常 (HTTP ' + resp.status + ')，請確認伺服器正在執行', 'err'); return; }
        if (data.error) { showMsg(data.error, 'err'); return; }
        showMsg('✅ 設定成功！正在跳轉…', 'ok');
        setTimeout(() => location.href = '/', 1200);
      } catch (e) {
        if (e.message.includes('fetch') || e.message.includes('Failed') || e.message.includes('NetworkError')) {
          showMsg('⚠️ 無法連線到伺服器。請確認已雙擊 start.bat 啟動，再透過 http://localhost:5000 開啟此頁面', 'err');
        } else {
          showMsg('儲存失敗：' + e.message, 'err');
        }
      } finally {
        btn.disabled = false;
        btn.textContent = '儲存並開始使用';
      }
    }

    document.getElementById('keyInput').addEventListener('keydown', e => { if(e.key==='Enter') saveKey(); });
  </script>
</body>
</html>
